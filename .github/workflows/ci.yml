name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build & test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore WiseOwl.Casc.slnx

      - name: Build
        run: dotnet build WiseOwl.Casc.slnx --configuration Release --no-restore

      # Integration tests that need a real Blizzard install self-skip when
      # one is absent (no game bytes are ever committed or downloaded in CI).
      - name: Test
        run: dotnet test WiseOwl.Casc.slnx --configuration Release --no-build --verbosity normal

  api-docs:
    name: API docs in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Regenerate the committed API reference from the XML doc comments and
      # fail if it differs — the docs can never drift from the public API.
      - name: Regenerate API docs
        run: bash scripts/gen-api-docs.sh

      - name: Verify no drift
        run: |
          if ! git diff --quiet -- docs/api; then
            echo "::error::docs/api is out of date. Run scripts/gen-api-docs.sh and commit."
            git diff --stat -- docs/api
            exit 1
          fi
