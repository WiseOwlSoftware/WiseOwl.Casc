name: CI

# Validation only. Runs on pull requests into main and on the merge
# commit to main — NOT on interim work-branch pushes (those match no
# trigger here, so day-to-day commits never start a run). Doc-only and
# asset-only changes are skipped: they cannot break the build or the
# API-doc contract.
on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'assets/**'
      - '.gitignore'
      - '.gitattributes'
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'assets/**'
      - '.gitignore'
      - '.gitattributes'

# A newer commit on the same PR/branch cancels the older still-running
# run, so a rapid series of pushes collapses to one validation build
# instead of a queue of now-stale ones.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore WiseOwl.Casc.slnx

      - name: Build
        run: dotnet build WiseOwl.Casc.slnx --configuration Release --no-restore

      # Integration tests that need a real Blizzard install self-skip when
      # one is absent (no game bytes are ever committed or downloaded in CI).
      - name: Test
        run: dotnet test WiseOwl.Casc.slnx --configuration Release --no-build --verbosity normal

  api-docs:
    name: API docs in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      # Regenerate the committed API reference from the XML doc comments and
      # fail if it differs — the docs can never drift from the public API.
      - name: Regenerate API docs
        run: bash scripts/gen-api-docs.sh

      - name: Verify no drift
        run: |
          if ! git diff --quiet -- docs/api; then
            echo "::error::docs/api is out of date. Run scripts/gen-api-docs.sh and commit."
            git diff --stat -- docs/api
            exit 1
          fi
